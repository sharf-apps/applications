<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #080810;
      font-family: 'DM Mono', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ANIMATED GRADIENT BG */
    .bg-canvas {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: radial-gradient(ellipse at 20% 50%, #1a0533 0%, transparent 50%),
                  radial-gradient(ellipse at 80% 20%, #0d2240 0%, transparent 50%),
                  radial-gradient(ellipse at 60% 80%, #1a1a00 0%, transparent 50%),
                  #080810;
    }

    /* FLOATING ORBS */
    .orb {
      position: fixed; border-radius: 50%; filter: blur(80px);
      pointer-events: none; z-index: 0; animation: floatOrb 12s ease-in-out infinite;
    }
    .orb1 { width: 450px; height: 450px; background: rgba(139,92,246,0.18); top: -120px; left: -80px; animation-delay: 0s; }
    .orb2 { width: 350px; height: 350px; background: rgba(236,72,153,0.12); top: 30%; right: -100px; animation-delay: -4s; }
    .orb3 { width: 300px; height: 300px; background: rgba(6,182,212,0.10); bottom: -80px; left: 20%; animation-delay: -8s; }
    .orb4 { width: 200px; height: 200px; background: rgba(245,158,11,0.10); bottom: 20%; right: 10%; animation-delay: -2s; }

    @keyframes floatOrb {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -40px) scale(1.08); }
      66% { transform: translate(-20px, 30px) scale(0.94); }
    }

    /* NOISE GRAIN */
    .noise {
      position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    /* STAR DOTS */
    .stars {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 25% 55%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 40% 25%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 70%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 75% 35%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 80%, rgba(255,255,255,0.2) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 5% 90%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 50% 50%, rgba(255,255,255,0.2) 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 85%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 5%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 15% 40%, rgba(255,255,255,0.5) 0%, transparent 100%);
    }

    .main-card {
      position: relative; z-index: 1;
      background: rgba(12, 8, 24, 0.75);
      border: 1px solid rgba(139,92,246,0.25);
      border-radius: 24px;
      padding: 52px 40px 44px;
      width: 92%; max-width: 400px;
      text-align: center;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.04), 0 32px 80px rgba(0,0,0,0.6), 0 0 60px rgba(139,92,246,0.08);
      backdrop-filter: blur(20px);
      animation: cardIn 0.6s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes cardIn { from { opacity:0; transform:translateY(24px) scale(0.97); } to { opacity:1; transform:translateY(0) scale(1); } }

    /* Glowing top border */
    .main-card::before {
      content: '';
      position: absolute; top: 0; left: 10%; right: 10%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(139,92,246,0.7), rgba(236,72,153,0.5), rgba(6,182,212,0.5), transparent);
      border-radius: 1px;
    }

    .brand-icon {
      font-size: 2.8rem; line-height: 1; margin-bottom: 14px; display: block;
      filter: drop-shadow(0 0 16px rgba(139,92,246,0.6));
      animation: iconPulse 3s ease-in-out infinite;
    }
    @keyframes iconPulse { 0%,100%{filter:drop-shadow(0 0 16px rgba(139,92,246,0.6))} 50%{filter:drop-shadow(0 0 28px rgba(236,72,153,0.7))} }

    .brand-title {
      font-family: 'Playfair Display', serif;
      font-size: 2rem; font-weight: 900;
      background: linear-gradient(135deg, #f0e8d5, #c084fc, #38bdf8);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.02em; line-height: 1.1; margin-bottom: 6px;
    }

    .brand-sub {
      font-size: 0.72rem; color: rgba(255,255,255,0.25);
      letter-spacing: 0.2em; text-transform: uppercase;
      margin-bottom: 36px;
    }

    .divider {
      width: 60px; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(139,92,246,0.6), rgba(236,72,153,0.4), transparent);
      margin: 0 auto 32px;
    }

    .nav-btn {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      width: 100%; padding: 18px 20px; border-radius: 12px;
      font-family: 'DM Mono', monospace; font-size: 0.85rem; font-weight: 500;
      letter-spacing: 0.14em; text-transform: uppercase;
      border: 1px solid transparent; text-decoration: none;
      transition: all 0.25s; cursor: pointer; margin-bottom: 14px;
    }
    .nav-btn:last-of-type { margin-bottom: 0; }
    .nav-btn:active { transform: scale(0.97); }

    .btn-quran {
      background: linear-gradient(135deg,rgba(201,168,76,0.14),rgba(201,168,76,0.07));
      border-color: rgba(201,168,76,0.35); color: #e8c97a;
    }
    .btn-quran:hover {
      background: linear-gradient(135deg,rgba(201,168,76,0.26),rgba(201,168,76,0.14));
      border-color: rgba(201,168,76,0.7); color: #f5d98a;
      box-shadow: 0 0 26px rgba(201,168,76,0.15);
    }

    .btn-motive {
      background: linear-gradient(135deg,rgba(45,212,191,0.12),rgba(45,212,191,0.05));
      border-color: rgba(45,212,191,0.3); color: #2dd4bf;
    }
    .btn-motive:hover {
      background: linear-gradient(135deg,rgba(45,212,191,0.22),rgba(45,212,191,0.12));
      border-color: rgba(45,212,191,0.65); color: #5eead4;
      box-shadow: 0 0 26px rgba(45,212,191,0.12);
    }

    .btn-ayah {
      background: linear-gradient(135deg,rgba(74,222,128,0.12),rgba(74,222,128,0.05));
      border-color: rgba(74,222,128,0.3); color: #4ade80;
    }
    .btn-ayah:hover {
      background: linear-gradient(135deg,rgba(74,222,128,0.22),rgba(74,222,128,0.12));
      border-color: rgba(74,222,128,0.65); color: #86efac;
      box-shadow: 0 0 26px rgba(74,222,128,0.12);
    }
.btn-icon { font-size: 1.2rem; }
    .btn-label { flex: 1; text-align: center; }
    .btn-arrow { opacity: 0.4; transition: transform 0.2s, opacity 0.2s; }
    .nav-btn:hover .btn-arrow { transform: translateX(4px); opacity: 1; }

    .footer-note {
      margin-top: 28px; font-size: 0.6rem;
      color: #2a3a47; letter-spacing: 0.15em; text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div class="bg-canvas"></div>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
  <div class="orb orb4"></div>
  <div class="noise"></div>
  <div class="stars"></div>

  <div class="main-card">
    <span class="brand-icon">✦</span>
    <div class="brand-title">My Space</div>
    <div class="brand-sub">Choose your path</div>
    <div class="divider"></div>

    <a href="quran-app.html" class="nav-btn btn-quran">
      <span class="btn-icon">☾</span>
      <span class="btn-label">Quran</span>
      <span class="btn-arrow">→</span>
    </a>

    <a href="motive.html" class="nav-btn btn-motive">
      <span class="btn-icon">✦</span>
      <span class="btn-label">Motive</span>
      <span class="btn-arrow">→</span>
    </a>

    <a href="ayah-search.html" class="nav-btn btn-ayah">
      <span class="btn-icon">🔍</span>
      <span class="btn-label">Ayah Search</span>
      <span class="btn-arrow">→</span>
    </a>

<div class="footer-note">tap to open</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
