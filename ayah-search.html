<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quran Topic Search</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --dark: #0d1117;
    --dark2: #161b22;
    --dark3: #1e2730;
    --text: #e6dcc8;
    --text-muted: #8b9ab0;
    --border: rgba(201,168,76,0.2);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Cinzel', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background geometric pattern */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      radial-gradient(circle at 20% 20%, rgba(201,168,76,0.04) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(201,168,76,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 20px;
  }

  header {
    text-align: center;
    margin-bottom: 50px;
  }

  .bismillah {
    font-family: 'Amiri', serif;
    font-size: 2.2rem;
    color: var(--gold);
    margin-bottom: 16px;
    display: block;
    letter-spacing: 2px;
  }

  header h1 {
    font-size: 2.4rem;
    font-weight: 600;
    letter-spacing: 4px;
    color: var(--text);
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  header p {
    color: var(--text-muted);
    font-family: 'Amiri', serif;
    font-size: 1.1rem;
    letter-spacing: 1px;
  }

  .divider {
    width: 200px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 20px auto;
  }

  /* Search */
  .search-wrap {
    position: relative;
    margin-bottom: 24px;
  }

  .search-wrap input {
    width: 100%;
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 16px 20px 16px 52px;
    color: var(--text);
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    letter-spacing: 2px;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
  }

  .search-wrap input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 20px rgba(201,168,76,0.1);
  }

  .search-wrap input::placeholder {
    color: var(--text-muted);
    letter-spacing: 2px;
  }

  .search-icon {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--gold);
    font-size: 1.1rem;
  }

  /* Topic pills */
  .topics {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 40px;
    justify-content: center;
  }

  .topic-pill {
    background: var(--dark2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 8px 18px;
    border-radius: 2px;
    cursor: pointer;
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: all 0.2s;
  }

  .topic-pill:hover, .topic-pill.active {
    background: rgba(201,168,76,0.1);
    border-color: var(--gold);
    color: var(--gold);
  }

  /* Results */
  .results-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
  }

  .results-header h2 {
    font-size: 0.85rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
  }

  .results-count {
    background: rgba(201,168,76,0.15);
    color: var(--gold);
    padding: 3px 10px;
    border-radius: 2px;
    font-size: 0.75rem;
    letter-spacing: 1px;
  }

  .no-results {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
    font-family: 'Amiri', serif;
    font-size: 1.2rem;
  }

  /* Aya card */
  .aya-card {
    background: var(--dark2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--gold);
    border-radius: 4px;
    padding: 28px;
    margin-bottom: 16px;
    transition: transform 0.2s, box-shadow 0.2s;
    animation: fadeIn 0.4s ease forwards;
  }

  .aya-card:hover {
    transform: translateX(4px);
    box-shadow: -4px 0 20px rgba(201,168,76,0.1);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .aya-arabic {
    font-family: 'Amiri', serif;
    font-size: 1.6rem;
    color: var(--gold-light);
    text-align: right;
    line-height: 2;
    margin-bottom: 16px;
    direction: rtl;
  }

  .aya-translation {
    font-family: 'Amiri', serif;
    font-size: 1.05rem;
    line-height: 1.8;
    color: var(--text);
    margin-bottom: 14px;
    font-style: italic;
  }

  .aya-ref {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 0.75rem;
    letter-spacing: 2px;
    color: var(--text-muted);
  }

  .aya-ref .surah-name {
    color: var(--gold);
    font-weight: 600;
  }

  .aya-tag {
    background: rgba(201,168,76,0.1);
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--gold-light);
    padding: 2px 10px;
    border-radius: 2px;
    font-size: 0.7rem;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .stagger { animation-delay: calc(var(--i) * 0.07s); opacity: 0; }
</style>
</head>
<body>
<div class="container">
  <header>
    <span class="bismillah">بِسْمِ اللهِ الرَّحْمَنِ الرَّحِيْمِ</span>
    <div class="divider"></div>
    <h1>Quran Topics</h1>
    <p>Search for Ayaat by theme and subject</p>
    <div class="divider"></div>
  </header>

  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="searchInput" placeholder="Search a topic... (prayer, fasting, patience...)" oninput="handleSearch(this.value)">
  </div>

  <div class="topics" id="topicPills"></div>

  <div id="resultsSection" style="display:none">
    <div class="results-header">
      <h2 id="resultsTitle">Results</h2>
      <span class="results-count" id="resultsCount">0 ayaat</span>
    </div>
    <div id="resultsList"></div>
  </div>

  <div id="noResults" class="no-results" style="display:none">
    No ayaat found for this topic.<br>Try: prayer, fasting, patience, gratitude...
  </div>
</div>

// Synonyms / keyword map
const synonyms = {
  salah: 'prayer', salat: 'prayer', pray: 'prayer',
  sawm: 'fasting', ramadan: 'fasting', ramadhan: 'fasting', fast: 'fasting',
  sabr: 'patience', patient: 'patience',
  shukr: 'gratitude', thankful: 'gratitude', thanks: 'gratitude', grateful: 'gratitude',
  zakat: 'charity', sadaqah: 'charity', donate: 'charity', giving: 'charity',
  ilm: 'knowledge', learn: 'knowledge', education: 'knowledge',
  sleep: 'sleeping', rest: 'sleeping', night: 'sleeping',
  tawakkul: 'trust', rely: 'trust', reliance: 'trust', tawakal: 'trust',
  muhammad: 'prophet', nabi: 'prophet', rasul: 'prophet', messenger: 'prophet', pbuh: 'prophet', saw: 'prophet',
  nikah: 'marriage', wife: 'marriage', husband: 'marriage', spouse: 'marriage',
  mother: 'parents', father: 'parents', parent: 'parents',
  jannah: 'paradise', heaven: 'paradise', hereafter: 'paradise', afterlife: 'death',
  death: 'death', die: 'death', akhirah: 'death',
  forgive: 'forgiveness', istighfar: 'forgiveness', repent: 'forgiveness', tawbah: 'forgiveness',
};

function normalizeQuery(q) {
  const lower = q.toLowerCase().trim();
  return synonyms[lower] || lower;
}

function findTopics(query) {
  const norm = normalizeQuery(query);
  return Object.entries(data).filter(([key]) => key.includes(norm) || norm.includes(key));
}

function handleSearch(value) {
  const input = value.trim();
  document.querySelectorAll('.topic-pill').forEach(p => p.classList.remove('active'));

  if (!input) {
    document.getElementById('resultsSection').style.display = 'none';
    document.getElementById('noResults').style.display = 'none';
    return;
  }
  const matched = findTopics(input);
  if (matched.length === 0) {
    document.getElementById('resultsSection').style.display = 'none';
    document.getElementById('noResults').style.display = 'block';
    return;
  }
  renderResults(matched);
}

function showTopic(key) {
  document.getElementById('searchInput').value = key;
  document.querySelectorAll('.topic-pill').forEach(p => {
    p.classList.toggle('active', p.dataset.key === key);
  });
  renderResults([[key, data[key]]]);
}

function renderResults(matched) {
  document.getElementById('noResults').style.display = 'none';
  document.getElementById('resultsSection').style.display = 'block';

  const allAyaat = matched.flatMap(([key, topic]) =>
    topic.ayaat.map(a => ({ ...a, topic: topic.label, key }))
  );

  document.getElementById('resultsTitle').textContent =
    matched.length === 1 ? matched[0][1].label : 'Results';
  document.getElementById('resultsCount').textContent = `${allAyaat.length} ayaat`;

  const list = document.getElementById('resultsList');
  list.innerHTML = allAyaat.map((a, i) => `
    <div class="aya-card stagger" style="--i:${i}">
      <div class="aya-arabic">${a.arabic}</div>
      <div class="aya-translation">"${a.translation}"</div>
      <div class="aya-ref">
        <span class="surah-name">${a.surah}</span>
        <span>·</span>
        <span>${a.verse}</span>
        <span class="aya-tag">${a.topic}</span>
      </div>
    </div>
  `).join('');
}

// Render topic pills
const pillsContainer = document.getElementById('topicPills');
Object.entries(data).forEach(([key, topic]) => {
  const btn = document.createElement('button');
  btn.className = 'topic-pill';
  btn.dataset.key = key;
  btn.textContent = topic.label;
  btn.onclick = () => showTopic(key);
  pillsContainer.appendChild(btn);
});
</script>
