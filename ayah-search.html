<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ayah Search — Quran by Topic</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Lora:ital,wght@0,400;0,600;1,400&family=Noto+Sans+Malayalam:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0d1117;
  --bg2: #13191f;
  --bg3: #1a2130;
  --gold: #f5c842;
  --gold-dim: rgba(245,200,66,0.12);
  --teal: #2dd4bf;
  --teal-dim: rgba(45,212,191,0.15);
  --teal-glow: rgba(45,212,191,0.06);
  --text: #e8edf2;
  --text2: #8fa3b3;
  --text3: #4a5f70;
  --border: rgba(45,212,191,0.12);
  --border2: rgba(255,255,255,0.06);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Lora',serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 600px 400px at 80% 20%,rgba(45,212,191,0.04) 0%,transparent 70%),radial-gradient(ellipse 400px 400px at 20% 80%,rgba(245,200,66,0.03) 0%,transparent 70%);pointer-events:none;z-index:0;}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:100;background:rgba(13,17,23,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:14px;}
.back-btn{display:flex;align-items:center;gap:6px;background:transparent;border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:7px 14px;color:var(--text2);font-family:'Lora',serif;font-size:0.7rem;cursor:pointer;transition:all 0.15s;text-decoration:none;white-space:nowrap;}
.back-btn:hover{border-color:var(--teal);color:var(--teal);}
.topbar-title{font-family:'Amiri',serif;font-size:1.3rem;color:var(--gold);}
.topbar-sub{font-size:0.6rem;color:var(--text3);letter-spacing:0.15em;text-transform:uppercase;}

/* HERO */
.hero{position:relative;z-index:1;text-align:center;padding:40px 20px 30px;}
.hero-ar{font-family:'Amiri',serif;font-size:2.5rem;color:var(--gold);text-shadow:0 0 40px rgba(245,200,66,0.2);margin-bottom:8px;}
.hero-en{font-size:0.75rem;color:var(--text3);letter-spacing:0.2em;text-transform:uppercase;margin-bottom:24px;}

/* SEARCH BOX */
.search-section{position:relative;z-index:1;max-width:600px;margin:0 auto;padding:0 20px 30px;}
.search-wrap{display:flex;gap:10px;margin-bottom:16px;}
.search-input{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 18px;color:var(--text);font-family:'Lora',serif;font-size:0.9rem;outline:none;transition:border-color 0.2s;}
.search-input:focus{border-color:var(--teal);}
.search-input::placeholder{color:var(--text3);}
.search-btn{background:var(--teal-dim);border:1px solid var(--teal);border-radius:10px;padding:14px 22px;color:var(--teal);font-family:'Lora',serif;font-size:0.8rem;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.search-btn:hover{background:rgba(45,212,191,0.25);}

/* TOPIC TAGS */
.topics-label{font-size:0.58rem;color:var(--text3);letter-spacing:0.2em;text-transform:uppercase;margin-bottom:10px;}
.topic-tags{display:flex;flex-wrap:wrap;gap:8px;}
.tag{padding:7px 14px;background:var(--bg3);border:1px solid var(--border2);border-radius:20px;font-size:0.72rem;color:var(--text2);cursor:pointer;transition:all 0.15s;}
.tag:hover{background:var(--gold-dim);border-color:rgba(245,200,66,0.4);color:var(--gold);}
.tag.active{background:var(--gold-dim);border-color:rgba(245,200,66,0.5);color:var(--gold);}

/* RESULTS */
.results-section{position:relative;z-index:1;max-width:800px;margin:0 auto;padding:0 20px 60px;}
.results-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:8px;}
.results-title{font-size:0.7rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--teal);}
.results-count{font-size:0.65rem;color:var(--text3);}

/* AYAH CARD */
.ayah-card{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;overflow:hidden;margin-bottom:16px;transition:border-color 0.2s;animation:fadeIn 0.3s ease both;}
.ayah-card:hover{border-color:rgba(245,200,66,0.3);}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ayah-meta{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--bg3);border-bottom:1px solid var(--border2);}
.ayah-ref{font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--teal);display:flex;align-items:center;gap:8px;}
.ayah-ref-badge{width:22px;height:22px;border:1px solid var(--teal-dim);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.55rem;background:var(--teal-glow);}
.ayah-surah-name{font-size:0.62rem;color:var(--text3);}
.ayah-arabic{padding:18px 18px 12px;font-family:'Amiri',serif;font-size:1.7rem;line-height:2;color:var(--text);text-align:right;direction:rtl;border-bottom:1px solid var(--border2);}
.ayah-translations{padding:14px 16px 16px;}
.trans-block{margin-bottom:10px;}
.trans-block:last-child{margin-bottom:0;}
.trans-lang{font-size:0.5rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--teal);margin-bottom:4px;display:flex;align-items:center;gap:5px;}
.trans-lang::after{content:'';flex:1;height:1px;background:var(--border2);}
.trans-en{font-family:'Lora',serif;font-size:0.83rem;line-height:1.8;color:var(--text2);font-style:italic;}
.trans-ml{font-family:'Noto Sans Malayalam',sans-serif;font-size:0.85rem;line-height:1.9;color:var(--text2);}

/* STATES */
.empty-state{text-align:center;padding:60px 20px;color:var(--text3);}
.empty-icon{font-size:3rem;margin-bottom:16px;opacity:0.4;}
.empty-title{font-size:1rem;color:var(--text2);margin-bottom:8px;}
.empty-sub{font-size:0.75rem;line-height:1.7;}
.loading-state{text-align:center;padding:60px 20px;color:var(--text3);}
.loader-ring{width:40px;height:40px;border:2px solid var(--border2);border-top-color:var(--teal);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-state p{font-size:0.67rem;letter-spacing:0.2em;text-transform:uppercase;}
</style>
</head>

// ===================== BUILD TOPIC TAGS =====================
function buildTags() {
  const wrap = document.getElementById('topicTags');
  wrap.innerHTML = Object.keys(TOPICS).map(key => `
    <span class="tag" onclick="searchTopic('${key}')">${TOPICS[key].label}</span>
  `).join('');
}

// ===================== SEARCH =====================
function doSearch() {
  const val = document.getElementById('searchInput').value.trim().toLowerCase();
  if (!val) return;

  // Find matching topic key
  const match = Object.keys(TOPICS).find(k =>
    k.includes(val) || val.includes(k) || TOPICS[k].label.toLowerCase().includes(val)
  );

  if (match) {
    searchTopic(match);
  } else {
    document.getElementById('resultsSection').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🤔</div>
        <div class="empty-title">No topic found for "${val}"</div>
        <div class="empty-sub">Try: prayer, fasting, patience, sleeping, parents,<br>gratitude, charity, forgiveness, knowledge, marriage,<br>honesty, quran, hope, food, wealth, jannah, health</div>
      </div>`;
  }
}

async function searchTopic(key) {
  const topic = TOPICS[key];
  if (!topic) return;

  // Update input & tags
  document.getElementById('searchInput').value = key;
  document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tag').forEach(t => {
    if (t.textContent === topic.label) t.classList.add('active');
  });

  const section = document.getElementById('resultsSection');
  section.innerHTML = `<div class="loading-state"><div class="loader-ring"></div><p>Loading verses on ${key}...</p></div>`;

  try {
    // Fetch all unique surahs needed
    const surahNums = [...new Set(topic.refs.map(r => r.s))];

    // Fetch Arabic, English, Malayalam for all needed surahs
    const fetches = surahNums.flatMap(n => [
      fetch(`https://api.alquran.cloud/v1/surah/${n}/ar.alafasy`).then(r=>r.json()),
      fetch(`https://api.alquran.cloud/v1/surah/${n}/en.sahih`).then(r=>r.json()),
      fetch(`https://api.alquran.cloud/v1/surah/${n}/ml.abdulhameed`).then(r=>r.json())
    ]);
    const results = await Promise.all(fetches);

    // Build surah data map
    const surahData = {};
    for (let i = 0; i < surahNums.length; i++) {
      const n = surahNums[i];
      const ar = results[i * 3];
      const en = results[i * 3 + 1];
      const ml = results[i * 3 + 2];
      surahData[n] = {
        ar: ar.code === 200 ? ar.data.ayahs : [],
        en: en.code === 200 ? en.data.ayahs : [],
        ml: ml.code === 200 ? ml.data.ayahs : []
      };
    }

    // Build cards
    const cards = topic.refs.map((ref, idx) => {
      const d = surahData[ref.s];
      if (!d || !d.ar[ref.v - 1]) return '';
      const arText = d.ar[ref.v - 1]?.text || '';
      const enText = d.en[ref.v - 1]?.text || '';
      const mlText = d.ml[ref.v - 1]?.text || '';

      return `
        <div class="ayah-card" style="animation-delay:${idx * 0.04}s">
          <div class="ayah-meta">
            <div class="ayah-ref">
              <div class="ayah-ref-badge">${ref.v}</div>
              Surah ${ref.s} · Verse ${ref.v}
            </div>
            <div class="ayah-surah-name">${SURAH_NAMES[ref.s] || ''}</div>
          </div>
          <div class="ayah-arabic">${arText}</div>
          <div class="ayah-translations">
            ${enText ? `<div class="trans-block"><div class="trans-lang">English · Sahih International</div><div class="trans-en">${enText}</div></div>` : ''}
            ${mlText ? `<div class="trans-block"><div class="trans-lang">Malayalam · മലയാളം</div><div class="trans-ml">${mlText}</div></div>` : ''}
          </div>
        </div>`;
    }).join('');

    section.innerHTML = `
      <div class="results-header">
        <div class="results-title">${topic.label}</div>
        <div class="results-count">${topic.refs.length} verses found</div>
      </div>
      ${cards}`;

  } catch(e) {
    section.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⚠️</div>
        <div class="empty-title">Failed to load</div>
