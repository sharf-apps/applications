<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>القرآن الكريم — The Holy Quran</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Lora:ital,wght@0,400;0,600;1,400&family=Noto+Sans+Malayalam:wght@400;500&display=swap" rel="stylesheet"/>
<style>
/* ── VARIABLES ── */
:root {
  --bg:       #0d1117;
  --bg2:      #13191f;
  --bg3:      #1a2130;
  --teal:     #2dd4bf;
  --teal-dim: rgba(45,212,191,0.15);
  --teal-glow:rgba(45,212,191,0.06);
  --gold:     #f5c842;
  --gold-dim: rgba(245,200,66,0.12);
  --text:     #e8edf2;
  --text2:    #8fa3b3;
  --text3:    #4a5f70;
  --border:   rgba(45,212,191,0.12);
  --border2:  rgba(255,255,255,0.06);
  --ar: 'Amiri', serif;
  --ui: 'Lora', serif;
  --ml: 'Noto Sans Malayalam', sans-serif;
}

/* ── RESET ── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  background:var(--bg);
  color:var(--text);
  font-family:var(--ui);
  min-height:100vh;
  overflow-x:hidden;
}
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background:
    radial-gradient(ellipse 600px 400px at 80% 20%, rgba(45,212,191,0.04), transparent 70%),
    radial-gradient(ellipse 400px 400px at 20% 80%, rgba(245,200,66,0.03), transparent 70%);
}

/* ── LAYOUT ── */
.app { position:relative; z-index:1; display:flex; height:100vh; overflow:hidden; }

/* ── SIDEBAR ── */
.sidebar {
  width:280px; flex-shrink:0;
  background:var(--bg2); border-right:1px solid var(--border);
  display:flex; flex-direction:column; overflow:hidden;
  transition:left 0.3s;
}
.sidebar-head {
  padding:20px 16px 14px; border-bottom:1px solid var(--border); text-align:center;
}
.sidebar-ar { font-family:var(--ar); font-size:1.8rem; color:var(--gold); text-shadow:0 0 30px rgba(245,200,66,0.3); }
.sidebar-en { font-size:0.58rem; letter-spacing:0.3em; text-transform:uppercase; color:var(--text2); margin-top:2px; }
.search-box {
  width:100%; background:var(--bg3); border:1px solid var(--border); border-radius:6px;
  padding:8px 12px; color:var(--text); font-family:var(--ui); font-size:0.73rem;
  outline:none; transition:border-color 0.2s;
}
.search-box:focus { border-color:var(--teal); }
.search-box::placeholder { color:var(--text3); }
.search-wrap { padding:10px; }
.surah-list {
  flex:1; overflow-y:auto; padding:5px 7px;
  scrollbar-width:thin; scrollbar-color:var(--teal-dim) transparent;
}
.surah-item {
  display:flex; align-items:center; gap:9px; padding:8px 9px;
  border-radius:6px; cursor:pointer; transition:background 0.15s;
  border:1px solid transparent;
}
.surah-item:hover { background:var(--teal-glow); }
.surah-item.active { background:var(--teal-dim); border-color:var(--border); }
.surah-num {
  width:28px; height:28px; border-radius:50%; flex-shrink:0;
  background:var(--bg3); border:1px solid var(--border2);
  display:flex; align-items:center; justify-content:center;
  font-size:0.58rem; color:var(--teal); font-family:monospace;
}
.surah-item.active .surah-num { background:var(--teal-dim); border-color:var(--teal); }
.surah-info { flex:1; min-width:0; }
.surah-en { font-size:0.77rem; font-weight:600; color:var(--text); }
.surah-meta { font-size:0.58rem; color:var(--text3); margin-top:1px; }
.surah-ar { font-family:var(--ar); font-size:1rem; color:var(--text2); flex-shrink:0; }
.surah-item.active .surah-ar { color:var(--gold); }

/* ── MAIN ── */
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; }

/* ── TOPBAR ── */
.topbar {
  background:var(--bg2); border-bottom:1px solid var(--border);
  padding:12px 22px; display:flex; align-items:center;
  justify-content:space-between; flex-shrink:0; gap:10px; flex-wrap:wrap;
}
.surah-heading { display:flex; align-items:center; gap:12px; }
.heading-ar { font-family:var(--ar); font-size:1.5rem; color:var(--gold); }
.heading-info h2 { font-size:0.88rem; font-weight:600; color:var(--text); }
.heading-info p  { font-size:0.58rem; color:var(--text2); text-transform:uppercase; letter-spacing:0.1em; margin-top:2px; }
.topbar-right { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.mob-btn {
  display:none; padding:6px 10px;
  background:var(--bg3); border:1px solid var(--border);
  border-radius:6px; color:var(--text2); cursor:pointer; font-size:0.8rem;
}
.lang-toggle { display:flex; background:var(--bg3); border:1px solid var(--border2); border-radius:6px; overflow:hidden; }
.lang-btn {
  padding:5px 10px; font-size:0.6rem; letter-spacing:0.1em; text-transform:uppercase;
  background:transparent; border:none; color:var(--text3); cursor:pointer;
  transition:all 0.15s; font-family:var(--ui);
}
.lang-btn.on { background:var(--teal-dim); color:var(--teal); }
.nav-btn {
  padding:6px 12px; background:var(--bg3); border:1px solid var(--border);
  border-radius:6px; color:var(--text2); font-family:var(--ui); font-size:0.67rem;
  cursor:pointer; transition:all 0.15s;
}
.nav-btn:hover { border-color:var(--teal); color:var(--teal); }
.nav-btn:disabled { opacity:0.3; cursor:default; }

/* ── AUDIO BAR ── */
.audio-bar {
  background:var(--bg3); border-bottom:1px solid var(--border2);
  padding:8px 22px; display:flex; align-items:center; gap:10px;
  flex-shrink:0; flex-wrap:wrap;
}
.audio-lbl { font-size:0.55rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--text3); white-space:nowrap; }
.play-btn {
  display:flex; align-items:center; gap:6px; padding:5px 12px;
  border-radius:20px; border:1px solid rgba(245,200,66,0.3);
  background:rgba(245,200,66,0.08); color:var(--gold);
  font-family:var(--ui); font-size:0.62rem; cursor:pointer; transition:all 0.2s;
}
.play-btn:hover, .play-btn.on { background:var(--gold-dim); border-color:rgba(245,200,66,0.5); }
.play-dot { width:7px; height:7px; border-radius:50%; background:var(--gold); flex-shrink:0; }
.prog-wrap { flex:1; min-width:100px; display:flex; flex-direction:column; gap:3px; }
.prog-track {
  height:3px; background:var(--border2); border-radius:2px;
  cursor:pointer; overflow:hidden;
}
.prog-fill { height:100%; background:linear-gradient(90deg,var(--teal),var(--gold)); border-radius:2px; width:0%; transition:width 0.3s; }
.prog-time { font-size:0.52rem; color:var(--text3); font-family:monospace; }
.stop-btn {
  padding:5px 10px; background:transparent; border:1px solid rgba(255,80,80,0.3);
  border-radius:4px; color:#ff6b6b; font-size:0.58rem; cursor:pointer; font-family:var(--ui);
  transition:all 0.15s;
}
.stop-btn:hover { background:rgba(255,80,80,0.1); }
.audio-status { font-size:0.58rem; color:var(--text3); font-style:italic; display:flex; align-items:center; gap:5px; }
.pulse { width:6px; height:6px; border-radius:50%; background:var(--teal); animation:pulse 1s ease infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }

/* ── BISMILLAH ── */
.bismillah {
  text-align:center; padding:18px 24px 14px; flex-shrink:0;
  font-family:var(--ar); font-size:1.8rem; color:var(--gold);
  text-shadow:0 0 40px rgba(245,200,66,0.2);
  border-bottom:1px solid var(--border2);
  background:linear-gradient(180deg,rgba(245,200,66,0.03),transparent);
}

/* ── VERSES ── */
.verses {
  flex:1; overflow-y:auto; padding:16px 22px 80px;
  scrollbar-width:thin; scrollbar-color:var(--teal-dim) transparent;
}
.verse-card {
  margin-bottom:14px; background:var(--bg2);
  border:1px solid var(--border2); border-radius:10px; overflow:hidden;
  transition:border-color 0.2s; animation:fadeUp 0.3s ease both;
}
.verse-card:hover { border-color:rgba(255,255,255,0.1); }
.verse-card.playing { border-color:rgba(245,200,66,0.5); box-shadow:0 0 12px rgba(245,200,66,0.08); }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.verse-head {
  display:flex; align-items:center; justify-content:space-between;
  padding:9px 14px; background:var(--bg3); border-bottom:1px solid var(--border2);
}
.verse-badge { display:flex; align-items:center; gap:7px; font-size:0.58rem; letter-spacing:0.15em; text-transform:uppercase; color:var(--teal); }
.verse-num-circle {
  width:22px; height:22px; border-radius:50%;
  border:1px solid var(--teal-dim); background:var(--teal-glow);
  display:flex; align-items:center; justify-content:center; font-size:0.55rem;
}
.verse-audio-btn {
  display:flex; align-items:center; gap:4px; padding:3px 8px;
  border-radius:12px; border:1px solid rgba(245,200,66,0.25);
  background:transparent; color:var(--gold); font-size:0.55rem;
  cursor:pointer; transition:all 0.15s;
}
.verse-audio-btn:hover, .verse-audio-btn.on { background:var(--gold-dim); border-color:rgba(245,200,66,0.5); }
.verse-arabic {
  padding:18px 18px 12px; font-family:var(--ar); font-size:1.75rem;
  line-height:2; color:var(--text); text-align:right; direction:rtl;
  border-bottom:1px solid var(--border2);
}
.arabic-word { cursor:pointer; border-radius:3px; padding:0 2px; display:inline; transition:all 0.15s; }
.arabic-word:hover { background:rgba(245,200,66,0.15); color:var(--gold); }
.verse-trans { padding:12px 16px 16px; }
.trans-block { margin-bottom:10px; }
.trans-block:last-child { margin-bottom:0; }
.trans-label {
  font-size:0.5rem; letter-spacing:0.25em; text-transform:uppercase; color:var(--teal);
  margin-bottom:4px; display:flex; align-items:center; gap:5px;
}
.trans-label::after { content:''; flex:1; height:1px; background:var(--border2); }
.trans-en { font-family:var(--ui); font-size:0.82rem; line-height:1.8; color:var(--text2); font-style:italic; }
.trans-ml { font-family:var(--ml); font-size:0.84rem; line-height:1.9; color:var(--text2); }

/* ── WORD POPUP ── */
.word-popup {
  position:fixed; z-index:9999; min-width:220px; max-width:290px;
  background:var(--bg3); border:1px solid rgba(245,200,66,0.35);
  border-radius:12px; padding:14px 16px;
  box-shadow:0 8px 40px rgba(0,0,0,0.6), 0 0 20px rgba(245,200,66,0.07);
  animation:popIn 0.18s cubic-bezier(0.16,1,0.3,1) both;
}
@keyframes popIn { from{opacity:0;transform:scale(0.88) translateY(4px)} to{opacity:1;transform:scale(1) translateY(0)} }
.popup-close {
  position:absolute; top:8px; right:10px;
  background:none; border:none; color:var(--text3); font-size:1rem; cursor:pointer; line-height:1;
}
.popup-close:hover { color:var(--text); }
.popup-word { font-family:var(--ar); font-size:1.5rem; color:var(--gold); text-align:center; margin-bottom:8px; direction:rtl; }
.popup-line { height:1px; background:var(--border2); margin-bottom:8px; }
.popup-row { display:flex; gap:8px; margin-bottom:6px; }
.popup-row:last-child { margin-bottom:0; }
.popup-tag { font-size:0.6rem; letter-spacing:0.1em; color:var(--teal); min-width:22px; padding-top:1px; flex-shrink:0; }
.popup-text { font-size:0.78rem; line-height:1.5; color:var(--text); }
.popup-text-ml { font-family:var(--ml); font-size:0.8rem; line-height:1.6; color:var(--text2); }
.popup-loading { text-align:center; font-size:0.62rem; color:var(--text3); letter-spacing:0.15em; padding:6px 0; }

/* ── STATES ── */
.loading-state {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; flex:1; gap:12px; color:var(--text3);
}
.loader { width:40px; height:40px; border:2px solid var(--border2); border-top-color:var(--teal); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
.loading-state p { font-size:0.67rem; letter-spacing:0.2em; text-transform:uppercase; }
.error-state {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; flex:1; gap:10px; color:var(--text3); padding:40px; text-align:center;
}
.error-state h3 { color:var(--text2); font-size:1rem; }
.error-state p { font-size:0.78rem; line-height:1.7; }
.retry-btn {
  margin-top:8px; padding:9px 22px;
  background:var(--teal-dim); border:1px solid var(--teal);
  border-radius:6px; color:var(--teal); font-family:var(--ui);
  font-size:0.7rem; cursor:pointer; transition:background 0.15s;
}
.retry-btn:hover { background:rgba(45,212,191,0.25); }
.welcome {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; flex:1; gap:16px; padding:40px; text-align:center;
}
.welcome-ar { font-family:var(--ar); font-size:4rem; color:var(--gold); text-shadow:0 0 60px rgba(245,200,66,0.25); line-height:1.2; }
.welcome-sub { font-size:0.73rem; color:var(--text3); letter-spacing:0.15em; text-transform:uppercase; max-width:300px; line-height:1.8; }
.welcome-hint { font-size:0.67rem; color:var(--text3); border:1px solid var(--border2); padding:8px 16px; border-radius:20px; }

/* ── OVERLAY (mobile) ── */
.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:200; }
.overlay.show { display:block; }

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .sidebar {
    position:fixed; left:-290px; top:0; bottom:0; z-index:300; width:290px;
    box-shadow:4px 0 20px rgba(0,0,0,0.5); transition:left 0.3s;
  }
  .sidebar.open { left:0; }
  .mob-btn { display:block; }
  .topbar, .audio-bar { padding:8px 12px; }
  .verses { padding:12px 12px 80px; }
  .bismillah { font-size:1.4rem; padding:16px; }
  .verse-arabic { font-size:1.4rem; }
}
</style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <div class="sidebar-ar">القرآن الكريم</div>
      <div class="sidebar-en">The Holy Quran</div>
    </div>
    <div class="search-wrap">
      <input class="search-box" id="searchBox" type="text" placeholder="Search surah..." oninput="filterSurahs(this.value)"/>
    </div>
    <div class="surah-list" id="surahList"></div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- TOPBAR -->
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:9px">
        <button class="mob-btn" onclick="toggleSidebar()">☰</button>
        <div class="surah-heading" id="surahHeading" style="display:none">
          <div class="heading-ar" id="headingAr"></div>
          <div class="heading-info">
            <h2 id="headingEn"></h2>
            <p id="headingMeta"></p>
          </div>
        </div>
      </div>
      <div class="topbar-right">
        <div class="lang-toggle">
          <button class="lang-btn on" id="btnEN" onclick="toggleLang('en')">EN</button>
          <button class="lang-btn on" id="btnML" onclick="toggleLang('ml')">ML</button>
        </div>
        <button class="nav-btn" id="btnPrev" onclick="navigate(-1)" disabled>&#8592; Prev</button>
        <button class="nav-btn" id="btnNext" onclick="navigate(1)"  disabled>Next &#8594;</button>
      </div>
    </div>

    <!-- AUDIO BAR -->
    <div class="audio-bar" id="audioBar" style="display:none">
      <span class="audio-lbl">Listen</span>
      <button class="play-btn" id="btnPlay" onclick="playSurah()">
        <span class="play-dot"></span> Arabic Recitation
      </button>
      <div class="prog-wrap" id="progWrap" style="display:none">
        <div class="prog-track" onclick="seekAudio(event)">
          <div class="prog-fill" id="progFill"></div>
        </div>
        <div class="prog-time" id="progTime">0:00</div>
      </div>
      <div class="audio-status" id="audioStatus" style="display:none">
        <div class="pulse"></div>
        <span id="audioStatusText"></span>
      </div>
      <button class="stop-btn" id="btnStop" onclick="stopAudio()" style="display:none">&#9632; Stop</button>
    </div>

    <!-- CONTENT -->
    <div id="content" style="flex:1;display:flex;flex-direction:column;overflow:hidden">
      <div class="welcome">
        <div class="welcome-ar">&#65021;</div>
        <div class="welcome-sub">&#1576;&#1616;&#1587;&#1618;&#1605;&#1616; &#1575;&#1604;&#1604;&#1617;&#1614;&#1607;&#1616; &#1575;&#1604;&#1585;&#1617;&#1614;&#1581;&#1618;&#1605;&#1614;&#1648;&#1606;&#1616; &#1575;&#1604;&#1585;&#1617;&#1614;&#1581;&#1616;&#1610;&#1605;&#1616;<br/>In the name of Allah, the Most Gracious, the Most Merciful</div>
        <div class="welcome-hint">Select a Surah to begin reading</div>
      </div>
    </div>

  </div>
</div>

<!-- MOBILE OVERLAY -->
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<script>
"use strict";

// ── SURAH DATA ──────────────────────────────────────────────
const SURAHS = [

  "دعاء":     {en:"Dua - Supplication, Prayer",              ml:"ദുആ - പ്രാർഥന"},
  "ذكر":      {en:"Dhikr - Remembrance of God",              ml:"ദ്ദിക്ർ - ദൈവ സ്മരണ"},
  "حلال":     {en:"Halal - Permitted, Lawful",               ml:"ഹലാൽ - അനുവദനീയം"},
  "حرام":     {en:"Haram - Forbidden, Unlawful",             ml:"ഹറാം - നിഷിദ്ധം"},
  "الحق":     {en:"Al-Haqq - The Truth, The Right",          ml:"അൽ-ഹഖ്ഖ് - സത്യം"},
  "الباطل":   {en:"Al-Batil - Falsehood",                    ml:"അൽ-ബാത്വിൽ - അസത്യം"},
  "الحياة":   {en:"Al-Hayah - Life",                         ml:"അൽ-ഹയ്യ - ജീവൻ"},
  "الموت":    {en:"Al-Mawt - Death",                         ml:"അൽ-മൗത്ത് - മരണം"},
  "قيامة":   {en:"Qiyama - Day of Resurrection",            ml:"ഖിയാമ - ഉയർത്തെഴുന്നേൽپ്"},
  "حساب":     {en:"Hisab - Reckoning, Account",              ml:"ഹിസാബ് - വിചാരണ"},
  "صراط":     {en:"Sirat - Path, Bridge",                    ml:"സ്വിറാത്ത് - പാലം, വഴി"},
  "جنة":      {en:"Jannah - Paradise",                       ml:"ജന്ന - സ്വർഗ്ഗം"},
  "نار":      {en:"Nar - Fire, Hell",                        ml:"നാർ - നരകം"},
  "نور":      {en:"Nur - Light",                             ml:"നൂർ - പ്രകാശം"},
  "قلب":      {en:"Qalb - Heart",                            ml:"ഖൽബ് - ഹൃദയം"},
  "روح":      {en:"Ruh - Soul, Spirit",                      ml:"റൂഹ് - ആത്മാവ്"},
  "امة":      {en:"Ummah - Community, Nation",               ml:"ഉമ്മ - സമൂഹം"},
  "النبأ":    {en:"An-Naba - The great news",                ml:"അൻ-നബഅ് - മഹത്തായ വാർത്ത"}
};

// ── STATE ───────────────────────────────────────────────────
let currentSurah = null;
let showEN = true;
let showML = true;
let audio = null;
let audioMode = null;
let popup = null;
let wordData = {};

// ── SIDEBAR ─────────────────────────────────────────────────
function buildSurahList(filter) {
  filter = (filter || "").toLowerCase();
  const html = SURAHS
    .filter(s =>
      !filter ||
      s.en.toLowerCase().includes(filter) ||
      s.ar.includes(filter) ||
      s.ml.includes(filter) ||
      String(s.n).includes(filter)
    )
    .map(s => {
      const active = currentSurah && currentSurah.n === s.n ? "active" : "";
      return `<div class="surah-item ${active}" onclick="loadSurah(${s.n})">
        <div class="surah-num">${s.n}</div>
        <div class="surah-info">
          <div class="surah-en">${s.en}</div>
          <div class="surah-meta">${s.type} &middot; ${s.v} verses</div>
        </div>
        <div class="surah-ar">${s.ar}</div>
      </div>`;
    })
    .join("");
  document.getElementById("surahList").innerHTML = html;
}

function filterSurahs(val) { buildSurahList(val); }
function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("open");
  document.getElementById("overlay").classList.toggle("show");
}
function closeSidebar() {
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("overlay").classList.remove("show");
}

// ── LOAD SURAH ───────────────────────────────────────────────
async function loadSurah(num) {
  stopAudio();
  currentSurah = SURAHS.find(s => s.n === num);
  buildSurahList(document.getElementById("searchBox").value);
  closeSidebar();

  // Update heading
  document.getElementById("surahHeading").style.display = "flex";
  document.getElementById("headingAr").textContent  = currentSurah.ar;
  document.getElementById("headingEn").textContent  = currentSurah.en + " \u2014 " + currentSurah.ml;
  document.getElementById("headingMeta").textContent = currentSurah.type + " \u00B7 " + currentSurah.v + " Verses \u00B7 Surah " + currentSurah.n;
  document.getElementById("btnPrev").disabled = num <= 1;
  document.getElementById("btnNext").disabled = num >= 114;
  document.getElementById("audioBar").style.display = "flex";

  // Show loading
  setContent(`
    <div style="flex:1;display:flex;flex-direction:column;overflow:hidden">
      ${num !== 9 ? '<div class="bismillah">\u0628\u0650\u0633\u0652\u0645\u0650 \u0627\u0644\u0644\u0651\u064E\u0647\u0650 \u0627\u0644\u0631\u0651\u064E\u062D\u0652\u0645\u064E\u0670\u0646\u0650 \u0627\u0644\u0631\u0651\u064E\u062D\u0650\u064A\u0645\u0650</div>' : ''}
      <div class="loading-state" id="loadingState">
        <div class="loader"></div>
        <p>Loading ${currentSurah.en}...</p>
      </div>
      <div class="verses" id="verses" style="display:none"></div>
    </div>
  `);

  await fetchVerses(num);
}

function setContent(html) {
  const el = document.getElementById("content");
  el.innerHTML = html;
}

// ── FETCH VERSES ─────────────────────────────────────────────
async function fetchVerses(num) {
  try {
    const [rAr, rEn, rMl, rWd] = await Promise.all([
      fetch("https://api.alquran.cloud/v1/surah/" + num + "/ar.alafasy"),
      fetch("https://api.alquran.cloud/v1/surah/" + num + "/en.sahih"),
      fetch("https://api.alquran.cloud/v1/surah/" + num + "/ml.abdulhameed"),
      fetch("https://api.quran.com/api/v4/verses/by_chapter/" + num + "?language=en&words=true&word_fields=text_uthmani%2Ctranslation&per_page=300&page=1")
    ]);
    const [dAr, dEn, dMl, dWd] = await Promise.all([rAr.json(), rEn.json(), rMl.json(), rWd.json()]);
    if (dAr.code !== 200) throw new Error("API error");

    const ar = dAr.data.ayahs;
    const en = dEn.data.ayahs;
    const ml = dMl.code === 200 ? dMl.data.ayahs : null;

    // Build word meanings map: key = "verseNum:wordPos" -> {ar, en}
    wordData = {};
    if (dWd.verses) {
      dWd.verses.forEach(verse => {
        const vn = verse.verse_number;
        if (verse.words) {
          verse.words.forEach((w, i) => {
            if (w.char_type_name === "word") {
              const key = vn + ":" + i;
              wordData[key] = {
                ar: w.text_uthmani || "",
                en: w.translation ? w.translation.text : ""
              };
            }
          });
        }
      });
    }

    document.getElementById("loadingState").style.display = "none";
    const versesEl = document.getElementById("verses");
    versesEl.style.display = "block";
    versesEl.innerHTML = ar.map((av, i) => buildCard(av, en[i], ml ? ml[i] : null, i + 1)).join("");

  } catch (e) {
    document.getElementById("loadingState").innerHTML = `
      <div class="error-state">
        <h3>Unable to load</h3>
        <p>Check your internet connection.</p>
        <button class="retry-btn" onclick="loadSurah(${num})">Try Again</button>
      </div>`;
  }
}

// ── BUILD VERSE CARD ─────────────────────────────────────────
function buildCard(av, ev, mv, vn) {
  const delay = Math.min((vn - 1) * 0.025, 0.8);

  const enBlock = showEN
    ? `<div class="trans-block">
        <div class="trans-label">English &middot; Sahih International</div>
        <div class="trans-en">${ev ? ev.text : ""}</div>
       </div>`
    : "";

  const mlBlock = showML
    ? `<div class="trans-block">
        <div class="trans-label">Malayalam &middot; \u0D2E\u0D32\u0D2F\u0D3E\u0D33\u0D02</div>
        <div class="trans-ml">${mv ? mv.text : "<span style='color:var(--text3);font-style:italic;font-family:var(--ui);font-size:0.75rem'>Not available for this surah.</span>"}</div>
       </div>`
    : "";

  const words = av.text.split(" ").map((w, wi) => {
    const ws = w.replace(/'/g, "&#39;");
    return `<span class="arabic-word" onclick="showWordPopup(event,'${ws}',${vn},${wi})">${w}</span>`;
  }).join(" ");

  return `
    <div class="verse-card" id="vc-${vn}" style="animation-delay:${delay}s">
      <div class="verse-head">
        <div class="verse-badge">
          <div class="verse-num-circle">${vn}</div>
          Verse ${vn}
        </div>
        <button class="verse-audio-btn" id="vbtn-${vn}" onclick="playVerse(${vn})">&#128266; &#1593;&#1585;&#1576;&#1610;</button>
      </div>
      <div class="verse-arabic">${words}</div>
      ${showEN || showML ? `<div class="verse-trans">${enBlock}${mlBlock}</div>` : ""}
    </div>`;
}

// ── AUDIO ────────────────────────────────────────────────────
function audioUrl(s, v) {
  return "https://verses.quran.com/Alafasy/mp3/" +
    String(s).padStart(3,"0") + String(v).padStart(3,"0") + ".mp3";
}

function fmtTime(s) {
  if (isNaN(s)) return "0:00";
  return Math.floor(s / 60) + ":" + String(Math.floor(s % 60)).padStart(2, "0");
}

function setStatus(txt, show) {
  const st   = document.getElementById("audioStatus");
  const stop = document.getElementById("btnStop");
  const pw   = document.getElementById("progWrap");
  st.style.display   = show ? "flex" : "none";
  stop.style.display = show ? "block" : "none";
  if (!show) { pw.style.display = "none"; document.getElementById("progFill").style.width = "0%"; }
  else document.getElementById("audioStatusText").textContent = txt;
}

function highlightVerse(n) {
  document.querySelectorAll(".verse-card").forEach(c => c.classList.remove("playing"));
  document.querySelectorAll(".verse-audio-btn").forEach(b => b.classList.remove("on"));
  if (n > 0) {
    const c = document.getElementById("vc-" + n);
    const b = document.getElementById("vbtn-" + n);
    if (c) { c.classList.add("playing"); c.scrollIntoView({behavior:"smooth",block:"nearest"}); }
    if (b) b.classList.add("on");
  }
}

function playVerse(vn) {
  stopAudio();
  audioMode = "verse";
  audio = new Audio(audioUrl(currentSurah.n, vn));
  audio.play().catch(() => setStatus("Audio unavailable", true));
  setStatus("Playing verse " + vn, true);
  document.getElementById("btnPlay").classList.add("on");
  highlightVerse(vn);
  audio.ontimeupdate = () => {
    const pct = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
    document.getElementById("progFill").style.width = pct + "%";
    document.getElementById("progWrap").style.display = "flex";
    document.getElementById("progTime").textContent = fmtTime(audio.currentTime) + " / " + fmtTime(audio.duration);
  };
  audio.onended = stopAudio;
  audio.onerror = () => setStatus("Audio unavailable", true);
}

function playSurah() {
  stopAudio();
  audioMode = "surah";
  playSeq(1);
}

function playSeq(vn) {
  if (!currentSurah || vn > currentSurah.v) { stopAudio(); return; }
  if (audioMode !== "surah") return;
  audio = new Audio(audioUrl(currentSurah.n, vn));
  audio.play().catch(() => playSeq(vn + 1));
  setStatus("Verse " + vn + " / " + currentSurah.v, true);
  document.getElementById("btnPlay").classList.add("on");
  highlightVerse(vn);
  audio.ontimeupdate = () => {
    const overall = ((vn - 1) / currentSurah.v) +
      (audio.duration ? (audio.currentTime / audio.duration) / currentSurah.v : 0);
    document.getElementById("progFill").style.width = (overall * 100) + "%";
    document.getElementById("progWrap").style.display = "flex";
    document.getElementById("progTime").textContent = "Verse " + vn + " \u00B7 " + fmtTime(audio.currentTime);
  };
  audio.onended = () => { if (audioMode === "surah") playSeq(vn + 1); };
}

function stopAudio() {
  if (audio) { audio.pause(); audio.src = ""; audio = null; }
  audioMode = null;
  document.getElementById("btnPlay").classList.remove("on");
  highlightVerse(-1);
  setStatus("", false);
}

function seekAudio(e) {
  if (!audio || !audio.duration) return;
  const r = e.currentTarget.getBoundingClientRect();
  audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration;
}

// ── LANG TOGGLE ──────────────────────────────────────────────
function toggleLang(lang) {
  if (lang === "en") {
    showEN = !showEN;
    document.getElementById("btnEN").classList.toggle("on", showEN);
  } else {
    showML = !showML;
    document.getElementById("btnML").classList.toggle("on", showML);
  }
  if (currentSurah) loadSurah(currentSurah.n);
}

function navigate(dir) {
  if (!currentSurah) return;
  const n = currentSurah.n + dir;
  if (n >= 1 && n <= 114) loadSurah(n);
}

// ── WORD POPUP ───────────────────────────────────────────────
function showWordPopup(e, word, verseNum, wordIdx) {
  e.stopPropagation();
  if (popup) { popup.remove(); popup = null; }

  // 1. Try live API word data (from quran.com word-by-word)
  const apiKey = verseNum + ":" + wordIdx;
  const apiWord = wordData[apiKey];
  let enMeaning = apiWord ? apiWord.en : "";

  // 2. Fallback to static dictionary for English
  const clean = word.replace(/[\u064B-\u065F\u0610-\u061A\u06D6-\u06DC]/g, "");
  const dictMatch = WORDS[clean] || WORDS[word];
  if (!enMeaning && dictMatch) enMeaning = dictMatch.en;

  // 3. Malayalam from static dictionary
  let mlMeaning = dictMatch ? dictMatch.ml : "";

  // 4. Final fallbacks
  if (!enMeaning) enMeaning = "Meaning not available";
  if (!mlMeaning) mlMeaning = "അർഥം ലഭ്യമല്ല";

  popup = document.createElement("div");
  popup.className = "word-popup";
  popup.innerHTML =
    '<button class="popup-close" onclick="closePopup()">&#10005;</button>' +
    '<div class="popup-word">' + word + '</div>' +
    '<div class="popup-line"></div>' +
    '<div class="popup-row"><div class="popup-tag">EN</div><div class="popup-text">' + enMeaning + '</div></div>' +
    '<div class="popup-row"><div class="popup-tag">ML</div><div class="popup-text-ml">' + mlMeaning + '</div></div>';

  document.body.appendChild(popup);

  const margin = 12, pw = 270, ph = 150;
  const vw = window.innerWidth, vh = window.innerHeight;
  let left = e.clientX - pw / 2;
  let top  = e.clientY + 14;
  if (left < margin) left = margin;
  if (left + pw > vw - margin) left = vw - pw - margin;
  if (top + ph > vh - margin) top = e.clientY - ph - 14;
  popup.style.left = left + "px";
  popup.style.top  = top  + "px";

  setTimeout(() => document.addEventListener("click", closePopupOutside, {once:true}), 100);
}

function closePopup() { if (popup) { popup.remove(); popup = null; } }
function closePopupOutside(e) { if (popup && !popup.contains(e.target)) closePopup(); }

// ── INIT ─────────────────────────────────────────────────────
buildSurahList();
setTimeout(() => loadSurah(1), 200);
</script>
